services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: train_tracker
      POSTGRES_USER: tracker
      POSTGRES_PASSWORD: ${DB_PASSWORD:-tracker_secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tracker -d train_tracker"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://tracker:${DB_PASSWORD:-tracker_secret}@db:5432/train_tracker
      API_BASE_URL: https://oebb.macistry.com/api
      TERNITZ_STATION_ID: "1131839"
      WIEN_MEIDLING_STATION_ID: "1191201"
      WIEN_WESTBAHNHOF_STATION_ID: "915006"
      POLL_INTERVAL_MINUTES: "5"
    ports:
      - "8080:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
